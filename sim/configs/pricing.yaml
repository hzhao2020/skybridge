# Cloud pricing and data-conversion tables (SkyFlow paper / Simulation.md).
# Monetary amounts are USD unless noted. Storage and DB instance charges assume 1 billable day.

video_mb_per_minute: 10.0
video_fps: 30
tokens_per_kb: 250
storage_days_per_month: 30.0
mb_per_vision_image: 0.3

# Calibration query workload (paper Query section).
query:
  requests_per_quality_level: 100
  workflow1_workflow2_ratio: [1, 1]
  video_duration_sec_min: 60
  video_duration_sec_max: 1800

quality_tiers:
  Q1: Essential
  Q2: Standard
  Q3: Premium

sampling_rates_fps:
  Q1: 0.2
  Q2: 0.5
  Q3: 1.0

quality_models:
  Q1: Claude Haiku 4.5
  Q2: Claude Sonnet 4.5
  Q3: Claude Opus 4.5

# Default Claude list prices ($/1M tokens) when a provider/region has no override.
