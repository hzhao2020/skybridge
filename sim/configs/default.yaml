# Paper / experiment hyperparameters (fixed for all runs unless overridden).
random_seed: 42          # RNG seed for queries, scenarios (rho), and endpoint latency scaling
num_scenarios_per_query: 50  # S = 50 scenarios per train/test query
num_heldout_scenarios_per_query: 0  # Deprecated; query-heldout evaluation is used instead.
eta: 0.05                # η CVaR tail confidence in SAA-CVaR MILP and post-eval CVaR

# all = every region in providers; first = one region per provider; integer = first N regions per provider.
regions_per_provider: all
num_train_queries_per_workflow_quality: 1000
num_test_queries_per_workflow_quality: 1000
num_queries_per_workflow_quality: 1000  # Backward-compatible alias for train queries.
num_queries_per_quality: 1000
top_k: 0  # 0 disables fixed top-k and uses active_batch_fraction instead.
# Legacy initializer knobs are ignored by the current SkyFlow algorithm, which
# starts with an empty active scenario-path cut set C^(0).
initial_active_fraction: 0.30
initial_active_strategy: qbr
initializer_validation_fraction: 0.20
initializer_selection_candidates:
  - qbr
active_batch_fraction: 0.05
max_iterations: 100
gurobi_time_limit_sec: 0
gurobi_mip_gap: 1.0e-9
latency_tiebreaker_weight: 0.0
endpoint_tiebreaker_weight: 0.0

# MTGP baseline hyperparameters.
mtgp_population_size: 12
mtgp_generations: 6
mtgp_max_depth: 4
mtgp_tournament_size: 3
mtgp_elite_count: 2
mtgp_crossover_rate: 0.80
mtgp_mutation_rate: 0.15

# Solver used by run_all.py (12 experiments: each workflow × each quality, run separately).
default_solver_method: decomposition

quality_models:
  Q1: Claude Haiku 4.5
  Q2: Claude Sonnet 4.5
  Q3: Claude Opus 4.5

llm_prices:
  Q1:
    input_price: 1
    output_price: 5
  Q2:
    input_price: 3
    output_price: 15
  Q3:
    input_price: 5
    output_price: 25

frames_per_shot:
  Q1: 1
  Q2: 2
  Q3: 3

providers:
  GCP:
    - us-east1
    - us-west1
    - europe-west1
    - asia-east1
  AWS:
    - us-west-2
    - us-east-2
    - ap-southeast-1
    - eu-central-1
  Aliyun:
    - cn-shanghai
    - cn-beijing
    - us-east-1
    - ap-southeast-1
  Azure:
    - westus2
    - eastus
    - westeurope
    - southeastasia
  Anthropic:
    - global
