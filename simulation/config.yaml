# 所有的仿真参数配置都放在这里
# 参数按照data amount, cost, utility, latency进行归类

# data amount
# Data conversion ratio
data_conversion_ratio:
  segment_mean: 1
  segment_std: 0.005
  split_mean: 1
  split_std: 0.005
  caption_mean: 0.01
  caption_std: 0.01
  query_mean: 0.5
  query_std: 0.3



# cost
# 存储价格 USD/GB/月
storage_price: [0.015, 0.025]
egress_price:
  intra_provider: [0.01, 0.05]
  cross_provider: [0.08, 0.12]

# LLM Token 价格（USD / 百万 tokens；与 nodes.LlmNode.calculate_token_cost 一致）
llm:
  input_price: [0.05, 2.0]
  output_multiplier: 4

# Segment / Split 价格
segment_center: [0.04, 0.08]
# split_center 按 **分钟** 计费（USD / min）
# 说明：此前实现按秒计费（USD / sec），这里将区间乘以 60 做等价换算。
split_center: [0.0006, 0.006]

# 存储相关（用于 cost 计算）
storage:
  hours: 24
  hours_per_month: 720.0





# latency
# ExecTime 参数（segment / split）
exec_time:
  segment:
    io_s_per_mb: [0.0005, 0.002]
    alpha: [2.5, 4.0]
    theta0: [2.2, 3.2]
    theta1: [1.8, 2.7]
  split:
    io_s_per_mb: [0.0005, 0.002]
    alpha: [2.5, 4.0]
    theta0: [0.30, 0.50]
    theta1: [0.25, 0.42]

# LLM latency 参数（alpha ms/token, beta ms, noise sigma ms）
llm_latency:
  alpha_ms_per_token: [20.0, 50.0]
  beta_ms: [400.0, 800.0]
  noise_sigma_ms: [30.0, 120.0]

# network
# 链路采样参数：均值和标准差的范围 [min, max]
# 为每条边生成时，先从该范围均匀采样出该边专属的 mean 和 std，再进行对数正态采样
network:
  inter_region_intra_provider: # 同provider不同region
    rtt_mean_ms: [50.0, 70.0]
    rtt_std_ms: [5.0, 15.0]
    bw_mean_mbps: [4000.0, 6000.0]
    bw_std_mbps: [800.0, 1500.0]
  intra_region_inter_provider: # 不同provider同region
    rtt_mean_ms: [3.0, 8.0]
    rtt_std_ms: [1.0, 4.0]
    bw_mean_mbps: [1500.0, 2500.0]
    bw_std_mbps: [300.0, 800.0]
  inter_region_inter_provider: # 不同provider不同region
    rtt_mean_ms: [80.0, 120.0]
    rtt_std_ms: [15.0, 35.0]
    bw_mean_mbps: [600.0, 1500.0]
    bw_std_mbps: [200.0, 600.0]
  edge_to_cloud:
    rtt_mean_ms: [30.0, 80.0]
    rtt_std_ms: [10.0, 40.0]
    bw_mean_mbps: [50.0, 300.0]
    bw_std_mbps: [20.0, 150.0]







# utility
utility_weight:
  segment: 0.1
  split: 0.0
  caption: 0.45
  query: 0.45

utility_value:
  segment: [0.6, 0.9]
  split: [1, 1]
  caption: [0.6, 0.9]
  query: [0.6, 0.9]
  



# llm token
# query
query_mean: [100, 150]
query_std: [200,250]

# Token 换算
input_tokens_per_mb: [175, 225]

# caption
caption_base: [10, 30]
caption_coef_per_mb: [50.0, 75.0]
caption_std: [50, 60]




# query
# Budget 线性模型系数（solver 用）
budget:
  # 通过 budget_setting.py（p95 分位 + 线性拟合）得到的 baseline
  baseline:
    latency_intercept_s: 146.178724
    latency_slope_per_mb: 15.068026
    cost_intercept_usd: 0.031489
    cost_slope_per_mb: 0.010597
  # 预算松弛系数：>1 更容易可行；越接近 1.0 越苛刻
  slack_factor:
    latency: 1.20
    cost: 1.20

# 数据量采样范围 [min, max] MB
data_size: [5.0, 500.0]
























# # 仿真经验参数配置
