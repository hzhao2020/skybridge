# 本地 → 云端 RTT + 带宽周期性探测配置
# 按需修改下列变量；勿将含密钥的敏感信息写入此文件。

# 云端 VM 的公网 IP 或可解析主机名（须从本机路由可达）
CLOUD_HOST="34.81.71.1"

# 可选：标签（仅用于 CSV 列与日志文件名，不参与测量）
REGION_LOCAL="local"
REGION_CLOUD="gcp-asia-east1"

# iperf3 端口（云端需: iperf3 -s -p <同端口>）
IPERF_PORT=5201

# 每次 iperf 持续时间（秒）
IPERF_SECONDS=10

# 每次 ping 发包数
PING_COUNT=10

# 采样间隔（秒），例如 300 = 每 5 分钟一次
INTERVAL_SEC=300

# 总运行时长；支持 86400、24h、12h 等形式
DURATION="24h"

# 日志目录（需可写）
LOG_DIR="${HOME}/log/local_to_cloud_probe"

# 是否在失败时继续（1=是）
CONTINUE_ON_ERROR=1
